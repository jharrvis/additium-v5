                                <!-- ID -->
                                <div class="font-mono text-clamp-order-id font-bold text-text" x-text="m.id"></div>
                                <!-- Technology badge -->
                                <div><span :class="m.techClass" x-text="m.tech || '—'"></span></div>
                                <!-- Machine + Brand -->
                                <div>
                                    <div class="machine-name text-text" x-text="m.machine || '—'"></div>
                                    <div class="machine-brand" x-show="m.brand" x-text="m.brand"></div>
                                </div>
                                <!-- Current Job + End Time -->
                                <div>
                                    <div class="job-title text-text" x-text="m.currentJob"></div>
                                    <div class="job-time" x-show="m.currentEnd" x-text="m.currentEnd"></div>
                                </div>
                                <!-- Next Job + End Time -->
                                <div>
                                    <div class="job-title text-muted" x-text="m.nextJob"></div>
                                    <div class="job-time" x-show="m.nextEnd" x-text="m.nextEnd"></div>
                                </div>
                                <!-- Last Problem -->
                                <div class="font-mono text-clamp-status text-muted" x-text="m.lastProblem"></div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── SCREEN 05: LEADS ───────────────────────────────────────────────── -->
        <div class="screen-slot leads" x-show="activeScreen===5" x-transition:enter="screen-fade-enter-active"
            x-transition:enter-start="screen-fade-enter" x-transition:leave="screen-fade-exit-active"
            x-transition:leave-start="screen-fade-exit">

            <div class="main-content flex-1 flex flex-col overflow-hidden relative z-[1] min-h-0">
                <div class="leads-grid flex-1 min-h-0">
                    <!-- Col 1: Contact Done -->
                    <div class="col-panel col-1 bg-surface border border-border shadow-card" style="border-radius:16px; overflow:hidden;">
                        <div class="col-header" style="padding:2vh 1.5vw 1.5vh">
                            <span class="col-title" x-text="t('leadCol1')"></span>
                            <span class="col-count">0</span>
                        </div>
                        <div class="lead-list" style="padding:1.5vh 1.2vw">
                            <div class="empty-state"><div class="empty-icon">📋</div><div x-text="t('leadEmpty')"></div></div>
                        </div>
                    </div>
                    <!-- Col 2: Meeting Programmed -->
                    <div class="col-panel col-2 bg-surface border border-border shadow-card" style="border-radius:16px; overflow:hidden;">
                        <div class="col-header" style="padding:2vh 1.5vw 1.5vh">
                            <span class="col-title" x-text="t('leadCol2')"></span>
                            <span class="col-count">0</span>
                        </div>
                        <div class="lead-list" style="padding:1.5vh 1.2vw">
                            <div class="empty-state"><div class="empty-icon">📅</div><div x-text="t('leadEmpty')"></div></div>
                        </div>
                    </div>
                    <!-- Col 3: Quote Sent -->
                    <div class="col-panel col-3 bg-surface border border-border shadow-card" style="border-radius:16px; overflow:hidden;">
                        <div class="col-header" style="padding:2vh 1.5vw 1.5vh">
                            <span class="col-title" x-text="t('leadCol3')"></span>
                            <span class="col-count">0</span>
                        </div>
                        <div class="lead-list" style="padding:1.5vh 1.2vw">
                            <div class="empty-state"><div class="empty-icon">📤</div><div x-text="t('leadEmpty')"></div></div>
                        </div>
                    </div>
                    <!-- Col 4: Pending Prototypes -->
                    <div class="col-panel col-4 bg-surface border border-border shadow-card" style="border-radius:16px; overflow:hidden;">
                        <div class="col-header" style="padding:2vh 1.5vw 1.5vh">
                            <span class="col-title" x-text="t('leadCol4')"></span>
                            <span class="col-count">0</span>
                        </div>
                        <div class="lead-list" style="padding:1.5vh 1.2vw">
                            <div class="empty-state"><div class="empty-icon">🔧</div><div x-text="t('leadEmpty')"></div></div>
                        </div>
                    </div>
                    <!-- Col 5: Waiting Answer -->
                    <div class="col-panel col-5 bg-surface border border-border shadow-card" style="border-radius:16px; overflow:hidden;">
                        <div class="col-header" style="padding:2vh 1.5vw 1.5vh">
                            <span class="col-title" x-text="t('leadCol5')"></span>
                            <span class="col-count">0</span>
                        </div>
                        <div class="lead-list" style="padding:1.5vh 1.2vw">
                            <div class="empty-state"><div class="empty-icon">⏳</div><div x-text="t('leadEmpty')"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── SCREEN WORKER (dynamic, one per employee) ────────────────────── -->
        <div class="screen-slot worker-screen" x-show="activeScreen >= 6"
            x-transition:enter="screen-fade-enter-active" x-transition:enter-start="screen-fade-enter"
            x-transition:leave="screen-fade-exit-active" x-transition:leave-start="screen-fade-exit">

            <template x-if="activeWorker">
                <div class="main-content flex-1 flex gap-[2vw] overflow-hidden relative z-[1] min-h-0">

                    <!-- Column 1: Tasks -->
                    <div class="todo emp-col flex-1 min-w-0 max-w-none bg-surface border border-border shadow-card flex flex-col">
                        <div class="emp-header py-[2vh] px-[1.8vw] border-b border-border flex justify-between items-center flex-shrink-0 bg-surface2">
                            <span class="emp-name text-clamp-emp-name font-bold uppercase tracking-widest font-mono"
                                x-text="activeWorker.name"></span>
                            <span class="emp-count font-mono text-clamp-emp-count bg-[rgba(37,99,235,0.1)] py-1 px-3 rounded-[100px] text-blue"
                                x-text="activeWorker.tasks.length"></span>
                        </div>
                        <div class="emp-tasks flex-1 overflow-y-auto py-[1.5vh] px-[1.2vw] flex flex-col gap-[1.2vh]">
                            <template x-if="activeWorker.tasks.length === 0">
                                <div class="flex items-center justify-center h-full font-mono text-muted uppercase tracking-widest text-sm opacity-50"
                                    x-text="t('workerNoTasks')"></div>
                            </template>
                            <template x-for="(task, ti) in activeWorker.tasks" :key="'wt'+ti">
                                <div class="task-card bg-surface2 border border-border py-[2vh] px-[1.2vw] flex flex-col gap-[1vh] min-h-auto h-auto animate-cardIn relative w-full"
                                    :class="{'is-urgent': task.isUrgent}"
                                    :style="`--prio-color:${task.color}; animation-delay:${ti*50}ms`">
                                    <div class="task-priority flex items-center gap-2">
                                        <div class="prio-dot w-[9px] h-[9px] rounded-full flex-shrink-0"></div>
                                        <span class="prio-label font-mono text-clamp-prio uppercase tracking-widest font-medium"
                                            x-text="task.priority"></span>
                                    </div>
                                    <div class="task-text text-clamp-task-text font-semibold leading-snug text-text break-words whitespace-normal overflow-visible"
                                        x-text="task.text"></div>
                                    <div class="task-deadline flex items-center gap-2 font-mono text-clamp-task-deadline text-red bg-[rgba(220,38,38,0.05)] py-1 px-[10px] rounded font-medium"
                                        x-show="task.deadlineDay || task.deadlineTime">
                                        <span x-text="task.deadlineDay"></span>
                                        <span x-show="task.deadlineDay && task.deadlineTime"> · </span>
                                        <span x-text="task.deadlineTime"></span>
                                    </div>
                                    <div class="task-status font-mono text-clamp-task-status text-muted uppercase tracking-widest mt-auto"
                                        x-text="task.status"></div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Column 2: Meetings & Events -->
                    <div class="events flex-1 flex flex-col min-w-0 bg-surface border border-border shadow-card"
                        style="border-radius:16px; overflow:hidden;">
                        <div class="worker-col-header">
                            <span x-text="t('workerMeetingsTitle')"></span>
                            <span class="worker-count-badge"
                                x-text="workerMeetings(activeWorker.name).today.length + workerMeetings(activeWorker.name).upcoming.length"></span>
                        </div>
                        <div class="event-list">
                            <template x-if="workerMeetings(activeWorker.name).today.length === 0 && workerMeetings(activeWorker.name).upcoming.length === 0">
                                <div class="empty-state">
                                    <div class="empty-icon">🗓</div>
                                    <div x-text="t('workerNoMeetings')"></div>
                                </div>
                            </template>

                            <!-- Today's events -->
                            <template x-for="(e, ei) in workerMeetings(activeWorker.name).today" :key="'wme'+ei">
                                <div class="event-card-today" :style="`animation-delay:${ei*50}ms`">
                                    <div class="ev-time" x-text="e.time || 'TBD'"></div>
                                    <div class="ev-title-today" x-text="e.title"></div>
                                    <div class="ev-meta">
                                        <span x-show="e.place">📍 <span x-text="e.place"></span></span>
                                    </div>
                                </div>
                            </template>

                            <!-- Upcoming events -->
                            <template x-for="(e, ei) in workerMeetings(activeWorker.name).upcoming" :key="'wmu'+ei">
                                <div class="dep-row" :style="`animation-delay:${ei*50}ms`">
                                    <div>
                                        <div class="dep-date" x-text="e.dateLabel"></div>
                                        <div class="dep-day" x-text="e.dayName"></div>
                                    </div>
                                    <div>
                                        <div class="dep-title" x-text="e.title"></div>
                                        <div class="dep-meta"
                                            x-text="[e.time, e.place].filter(Boolean).join(' · ')"></div>
                                    </div>
                                    <div class="dep-badge" :class="e.badgeClass"
                                        x-text="e.days===1?t('evTomorrow'):e.days===0?t('evToday'):t('evInDays').replace('{n}',e.days)"></div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Column 3: Holidays (placeholder) -->
                    <div class="flex flex-col bg-surface border border-border shadow-card"
                        style="border-radius:16px; overflow:hidden; width:clamp(180px,22vw,280px); flex-shrink:0;">
                        <div class="worker-col-header">
                            <span x-text="t('workerHolidaysTitle')"></span>
                        </div>
                        <div class="flex-1 flex items-center justify-center flex-col gap-4" style="opacity:0.35">
                            <span style="font-size:3rem">🏖️</span>
                            <span class="font-mono text-muted uppercase tracking-widest"
                                style="font-size:clamp(0.6rem,1vw,0.75rem)"
                                x-text="t('workerHolidaysComingSoon')"></span>
                        </div>
                    </div>

                </div>
            </template>
        </div>

    </div><!-- /screen-container -->

    <!-- STATUS BAR -->
    <div class="status-bar flex-shrink-0 mt-[1.5vh] relative z-[1]"
         :class="{'sb-collapsed': settings.autoHideStatusBar && !statusBarVisible}"
         @mouseenter="sbEnter()" @mouseleave="sbLeave()">
        <div class="sync-track h-[3px] bg-[rgba(0,0,0,0.05)] mb-[1.2vh] overflow-hidden rounded-[2px]">
            <div class="sync-fill h-full rounded-[2px]" :class="{flash:synced}"
                :style="`width:${rotatePct}%;background:var(--blue)`"></div>
        </div>
        <div class="status-row font-mono text-clamp-status text-muted pb-[1.5vh]"
            style="display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:0 2vw;">

            <!-- Left: Live indicator -->
            <div class="status-left flex items-center gap-2 flex-shrink-0">
                <div
                    class="live-dot w-[7px] h-[7px] rounded-full bg-green shadow-[0_0_10px_var(--green)] animate-blink flex-shrink-0">
                </div>
                <span x-text="t('live')"></span> <span x-text="lastSync"></span>
            </div>

            <!-- Center: All controls in one pill -->
            <div
                class="status-controls flex items-center gap-[6px] bg-surface py-1 px-1 rounded-[12px] border border-border shadow-btn flex-shrink-0">
                <button
                    class="nav-btn flex items-center justify-center w-[42px] h-[42px] border-none bg-transparent rounded-[8px] cursor-pointer text-muted transition-all duration-200 ease-cubic hover:bg-[rgba(0,0,0,0.05)] hover:text-text hover:-translate-y-[1px] active:scale-95 mr-2 relative"
                    @click="setScreen(1)" title="Home">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </button>
                <button
                    class="nav-btn flex items-center justify-center w-[42px] h-[42px] border-none bg-transparent rounded-[8px] cursor-pointer text-muted transition-all duration-200 ease-cubic hover:bg-[rgba(0,0,0,0.05)] hover:text-text hover:-translate-y-[1px] active:scale-95"
                    @click="prevScreen()" title="Previous">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <button
                    class="nav-btn flex items-center justify-center w-[42px] h-[42px] border-none bg-transparent rounded-[8px] cursor-pointer text-muted transition-all duration-200 ease-cubic hover:bg-[rgba(0,0,0,0.05)] hover:text-text hover:-translate-y-[1px] active:scale-95"
                    :class="{paused:paused}" @click="togglePause()" :title="paused?'Resume':'Pause'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <g x-show="!paused">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </g>
                        <g x-show="paused">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </g>
                    </svg>
                </button>
                <button
                    class="nav-btn flex items-center justify-center w-[42px] h-[42px] border-none bg-transparent rounded-[8px] cursor-pointer text-muted transition-all duration-200 ease-cubic hover:bg-[rgba(0,0,0,0.05)] hover:text-text hover:-translate-y-[1px] active:scale-95"
                    @click="nextScreen()" title="Next">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
                <!-- Separator -->
                <div class="w-px bg-border flex-shrink-0" style="height:60%;margin:0 2px"></div>
                <!-- Screen selector -->
                <select class="status-select"
                    @change="setScreen(parseInt($event.target.value))">
                    <option value="1" :selected="activeScreen===1" x-text="t('scr1')"></option>
                    <option value="2" :selected="activeScreen===2" x-text="t('scr2')"></option>
                    <option value="3" :selected="activeScreen===3" x-text="t('scr3')"></option>
                    <option value="4" :selected="activeScreen===4" x-text="t('scr4')"></option>
                    <option value="5" :selected="activeScreen===5" x-text="t('scr5')"></option>
                    <template x-if="todo.employees.length > 0">
                        <option disabled>──────────</option>
                    </template>
                    <template x-for="(emp, wi) in todo.employees" :key="'ws'+emp.name">
                        <option :value="6 + wi" :selected="activeScreen === 6 + wi" x-text="'👤 ' + emp.name"></option>
                    </template>
                </select>
                <!-- Separator -->
                <div class="w-px bg-border flex-shrink-0" style="height:60%;margin:0 2px"></div>
                <!-- Rotate interval -->
                <span class="px-1" x-text="t('rotate')"></span>
                <select class="status-select"
                    @change="setRotateInterval(parseInt($event.target.value))">
                    <option value="15" :selected="settings.rotateInterval===15">15S</option>
                    <option value="30" :selected="settings.rotateInterval===30">30S</option>
                    <option value="45" :selected="settings.rotateInterval===45">45S</option>
                    <option value="60" :selected="settings.rotateInterval===60">60S</option>
                    <option value="90" :selected="settings.rotateInterval===90">90S</option>
                    <option value="120" :selected="settings.rotateInterval===120">120S</option>
                </select>
                <span x-show="settings.showCountdown" class="px-1" x-text="t('nextIn')+' '+rotateCd+'s'"></span>
                <!-- Separator -->
                <div class="w-px bg-border flex-shrink-0" style="height:60%;margin:0 2px"></div>
                <!-- Fullscreen button -->
                <button
                    class="nav-btn flex items-center justify-center w-[42px] h-[42px] border-none bg-transparent rounded-[8px] cursor-pointer text-muted transition-all duration-200 ease-cubic hover:bg-[rgba(0,0,0,0.05)] hover:text-text hover:-translate-y-[1px] active:scale-95"
                    @click="toggleFullscreen()" :title="isFullscreen ? 'Exit Fullscreen' : 'Fullscreen'">
                    <svg x-show="!isFullscreen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <polyline points="9 21 3 21 3 15"></polyline>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                        <line x1="3" y1="21" x2="10" y2="14"></line>
                    </svg>
                    <svg x-show="isFullscreen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 14 10 14 10 20"></polyline>
                        <polyline points="20 10 14 10 14 4"></polyline>
                        <line x1="10" y1="14" x2="3" y2="21"></line>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                    </svg>
                </button>
                <!-- Separator -->
                <div class="w-px bg-border flex-shrink-0" style="height:60%;margin:0 2px"></div>
                <!-- Settings (Gear) button -->
                <button
                    class="nav-btn flex items-center justify-center w-[42px] h-[42px] border-none bg-transparent rounded-[8px] cursor-pointer text-muted transition-all duration-200 ease-cubic hover:bg-[rgba(0,0,0,0.05)] hover:text-text hover:-translate-y-[1px] active:scale-95"
                    :class="settingsOpen ? 'gear-open' : ''"
                    @click="settingsOpen=true" :title="t('settTitle')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
                    </svg>
                </button>
            </div>

            <!-- Right: refresh countdown + date -->
            <div class="flex items-center justify-end gap-[1.5vw] flex-shrink-0">
                <div x-show="settings.showCountdown"><span x-text="t('refreshIn')"></span> <b :style="`color:${syncColor}`" x-text="refreshCd+'S'"></b></div>
                <div x-text="dateStr"></div>
            </div>
        </div>
    </div>

    <!-- BOTTOM HOVER TRIGGER (auto-hide status bar) -->
    <div class="sb-trigger" x-show="settings.autoHideStatusBar && !statusBarVisible"
         @mouseenter="sbEnter()"></div>

    <!-- SETTINGS MODAL -->
    <div class="settings-backdrop" x-show="settingsOpen" x-cloak
         @keydown.escape.window="settingsOpen=false">
        <div class="settings-overlay" @click="settingsOpen=false"></div>
        <div class="settings-card">

            <!-- Header -->
            <div class="settings-header">
                <div>
                    <div style="font-size:16px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text)" x-text="t('settTitle')"></div>
                    <div style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:4px" x-text="t('settSubtitle')"></div>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <!-- Language selector -->
                    <div class="lang-pills">
                        <button class="lang-pill" :class="settings.lang==='en' ? 'on' : ''"
                                @click="settings.lang='en'">EN</button>
                        <button class="lang-pill" :class="settings.lang==='es' ? 'on' : ''"
                                @click="settings.lang='es'">ES</button>
                    </div>
                    <button class="settings-close" @click="settingsOpen=false">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Body: 2-column grid -->
            <div class="settings-body">

                <!-- ── LEFT COLUMN: Display ──────────────────────────── -->
                <div class="settings-col settings-col-left">
                    <div class="settings-section">
                        <div class="settings-section-label" x-text="t('secDisplay')"></div>

                        <!-- Countdown timers -->
                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label" x-text="t('setCountdownLabel')"></div>
                                <div class="settings-row-desc" x-text="t('setCountdownDesc')"></div>
                            </div>
                            <button class="tog" :class="settings.showCountdown ? 'on' : 'off'"
                                    @click="settings.showCountdown=!settings.showCountdown">
                                <span class="tog-thumb"></span>
                            </button>
                        </div>

                        <!-- Clock format -->
                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label" x-text="t('setClockLabel')"></div>
                                <div class="settings-row-desc" x-text="t('setClockDesc')"></div>
                            </div>
                            <div class="i-pills">
                                <button class="i-pill" :class="settings.clockFormat==='24h' ? 'on' : ''"
                                        @click="settings.clockFormat='24h'">24H</button>
                                <button class="i-pill" :class="settings.clockFormat==='12h' ? 'on' : ''"
                                        @click="settings.clockFormat='12h'">12H</button>
                            </div>
                        </div>

                        <!-- Theme -->
                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label" x-text="t('setThemeLabel')"></div>
                                <div class="settings-row-desc" x-text="t('setThemeDesc')"></div>
                            </div>
                            <div class="i-pills">
                                <button class="i-pill" :class="!settings.darkMode ? 'on' : ''"
                                        @click="settings.darkMode=false" x-text="t('setThemeLight')"></button>
                                <button class="i-pill" :class="settings.darkMode ? 'on' : ''"
                                        @click="settings.darkMode=true" x-text="t('setThemeDark')"></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── DIVIDER ────────────────────────────────────────── -->
                <div class="settings-col-divider"></div>

                <!-- ── RIGHT COLUMN: Rotation + Refresh ─────────────── -->
                <div class="settings-col settings-col-right">

                    <!-- Auto Rotation -->
                    <div class="settings-section">
                        <div class="settings-section-label" x-text="t('secRotation')"></div>

                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label" x-text="t('setAutoRotateLabel')"></div>
                                <div class="settings-row-desc" x-text="t('setAutoRotateDesc')"></div>
                            </div>
                            <button class="tog" :class="settings.autoRotate ? 'on' : 'off'"
                                    @click="settings.autoRotate=!settings.autoRotate">
                                <span class="tog-thumb"></span>
                            </button>
                        </div>

                        <div class="settings-row" :style="settings.autoRotate ? '' : 'opacity:0.38;pointer-events:none'">
                            <div>
                                <div class="settings-row-label" x-text="t('setRotateIntervalLabel')"></div>
                                <div class="settings-row-desc" x-text="t('setCurrent')+': '+settings.rotateInterval+t('settSeconds')"></div>
                            </div>
                            <div>
                                <div class="i-pills">
                                    <button class="i-pill" :class="settings.rotateInterval===30&&!_rotateCustom?'on':''"
                                            @click="setRotateInterval(30);_rotateCustom=false">30S</button>
                                    <button class="i-pill" :class="settings.rotateInterval===45&&!_rotateCustom?'on':''"
                                            @click="setRotateInterval(45);_rotateCustom=false">45S</button>
                                    <button class="i-pill" :class="settings.rotateInterval===60&&!_rotateCustom?'on':''"
                                            @click="setRotateInterval(60);_rotateCustom=false">1MIN</button>
                                    <button class="i-pill" :class="settings.rotateInterval===120&&!_rotateCustom?'on':''"
                                            @click="setRotateInterval(120);_rotateCustom=false">2MIN</button>
                                    <button class="i-pill" :class="_rotateCustom?'on':''"
                                            @click="_rotateCustom=!_rotateCustom" x-text="t('settCustom')"></button>
                                </div>
                                <div x-show="_rotateCustom" style="margin-top:8px;display:flex;align-items:center;gap:8px;justify-content:flex-end">
                                    <input type="number" min="5" max="3600" class="s-input"
                                           :value="settings.rotateInterval"
                                           @change="setRotateInterval(Math.max(5,parseInt($event.target.value)||45))">
                                    <span style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)" x-text="t('settSeconds')==='s'?'sec':'seg'"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Data Refresh -->
                    <div class="settings-section" style="border-top:1px solid var(--border);padding-top:20px;margin-top:8px">
                        <div class="settings-section-label" x-text="t('secRefresh')"></div>

                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label" x-text="t('setRefreshIntervalLabel')"></div>
                                <div class="settings-row-desc" x-text="t('setCurrent')+': '+settings.refreshInterval+t('settSeconds')"></div>
                            </div>
                            <div>
                                <div class="i-pills">
                                    <button class="i-pill" :class="settings.refreshInterval===15&&!_refreshCustom?'on':''"
                                            @click="setRefreshInterval(15);_refreshCustom=false">15S</button>
                                    <button class="i-pill" :class="settings.refreshInterval===30&&!_refreshCustom?'on':''"
                                            @click="setRefreshInterval(30);_refreshCustom=false">30S</button>
                                    <button class="i-pill" :class="settings.refreshInterval===60&&!_refreshCustom?'on':''"
                                            @click="setRefreshInterval(60);_refreshCustom=false">1MIN</button>
                                    <button class="i-pill" :class="settings.refreshInterval===120&&!_refreshCustom?'on':''"
                                            @click="setRefreshInterval(120);_refreshCustom=false">2MIN</button>
                                    <button class="i-pill" :class="_refreshCustom?'on':''"
                                            @click="_refreshCustom=!_refreshCustom" x-text="t('settCustom')"></button>
                                </div>
                                <div x-show="_refreshCustom" style="margin-top:8px;display:flex;align-items:center;gap:8px;justify-content:flex-end">
                                    <input type="number" min="10" max="3600" class="s-input"
                                           :value="settings.refreshInterval"
                                           @change="setRefreshInterval(Math.max(10,parseInt($event.target.value)||30))">
                                    <span style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)" x-text="t('settSeconds')==='s'?'sec':'seg'"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ── FULL WIDTH: Status Bar ─────────────────────────── -->
                <div class="settings-full">
                    <div class="settings-section-label" x-text="t('secStatusBar')"></div>
                    <div class="settings-row">
                        <div>
                            <div class="settings-row-label" x-text="t('setAutoHideLabel')"></div>
                            <div class="settings-row-desc" x-text="t('setAutoHideDesc')"></div>
                        </div>
                        <button class="tog" :class="settings.autoHideStatusBar ? 'on' : 'off'"
                                @click="settings.autoHideStatusBar=!settings.autoHideStatusBar; if(!settings.autoHideStatusBar) statusBarVisible=true">
                            <span class="tog-thumb"></span>
                        </button>
                    </div>
                </div>

            </div><!-- /settings-body -->

            <!-- Footer -->
            <div class="settings-footer">
                <button class="reset-btn" @click="resetSettings()" x-text="t('settReset')"></button>
            </div>

        </div><!-- /settings-card -->
    </div><!-- /settings-backdrop -->

</body>

</html>
