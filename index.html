<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADDITIUM 3D — MASTER DASHBOARD SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=12">
    <script src="js/config.js?v=11"></script>
    <script src="js/app.js?v=12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }

        /* ── Layout ────────────────────────────────────────────────── */
        .master-wrap {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .screen-container { flex: 1; position: relative; overflow: hidden; }
        .screen-slot { position: absolute; inset: 0; display: flex; flex-direction: column; }

        /* ── Dark mode ─────────────────────────────────────────────── */
        html[data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #252938;
            --border: rgba(255,255,255,0.07);
            --text: #e8eaf0;
            --muted: rgba(232,234,240,0.45);
            --blue: #4d8ef5;
            --green: #34d399;
            --amber: #fbbf24;
            --red: #f87171;
            --purple: #a78bfa;
        }
        html[data-theme="dark"] body::before {
            background-image: linear-gradient(rgba(77,142,245,.03) 1px, transparent 0),
                              linear-gradient(90deg, rgba(77,142,245,.03) 1px, transparent 0);
        }
        html[data-theme="dark"] .hover\:bg-\[rgba\(0\2c 0\2c 0\2c 0\.05\)\]:hover,
        html[data-theme="dark"] .nav-btn:hover { background: rgba(255,255,255,0.07) !important; }
        html[data-theme="dark"] .bg-\[rgba\(0\2c 0\2c 0\2c 0\.05\)\] { background-color: rgba(255,255,255,0.05) !important; }
        html[data-theme="dark"] .sync-track { background: rgba(255,255,255,0.06) !important; }
        html[data-theme="dark"] .empty-board,
        html[data-theme="dark"] .empty-table { color: rgba(255,255,255,0.12) !important; }
        html[data-theme="dark"] .text-\[rgba\(0\2c 0\2c 0\2c 0\.1\)\],
        html[data-theme="dark"] .text-\[rgba\(0\2c 0\2c 0\2c 0\.15\)\] { color: rgba(255,255,255,0.12) !important; }
        html[data-theme="dark"] .task-deadline { background: rgba(248,113,113,0.08) !important; }
        html[data-theme="dark"] .settings-close:hover,
        html[data-theme="dark"] .tog.off { background: rgba(255,255,255,0.1) !important; }
        html[data-theme="dark"] .i-pill:hover { border-color: rgba(255,255,255,0.25) !important; }
        html[data-theme="dark"] .settings-row + .settings-row { border-color: rgba(255,255,255,0.05) !important; }
        html[data-theme="dark"] .settings-col-divider { background: rgba(255,255,255,0.06) !important; }

        /* ── Importance pills (Screen 01) ────────────────────── */
        html[data-theme="dark"] .pill-maxima { background: rgba(52,211,153,0.15) !important; color: #6ee7b7 !important; }
        html[data-theme="dark"] .pill-alta   { background: rgba(52,211,153,0.12) !important; color: #86efac !important; }
        html[data-theme="dark"] .pill-normal { background: rgba(248,113,113,0.12) !important; color: #fca5a5 !important; }
        html[data-theme="dark"] .pill-baja   { background: rgba(248,113,113,0.15) !important; color: #fca5a5 !important; }

        /* ── Order status chips (Screen 02) ──────────────────── */
        html[data-theme="dark"] .chip-ship { background: rgba(52,211,153,0.12) !important; color: #6ee7b7 !important; }
        html[data-theme="dark"] .chip-prod { background: rgba(248,113,113,0.12) !important; color: #fca5a5 !important; }
        html[data-theme="dark"] .chip-pend { background: rgba(248,113,113,0.18) !important; color: #fca5a5 !important; }
        html[data-theme="dark"] .chip-done { background: rgba(52,211,153,0.15) !important; color: #6ee7b7 !important; }

        /* ── Event dep badges (bg + border; text already uses var()) ── */
        html[data-theme="dark"] .dep-badge.normal   { background: rgba(167,139,250,0.12) !important; border-color: rgba(167,139,250,0.25) !important; }
        html[data-theme="dark"] .dep-badge.soon     { background: rgba(251,191,36,0.1) !important;   border-color: rgba(251,191,36,0.22) !important; }
        html[data-theme="dark"] .dep-badge.tomorrow { background: rgba(248,113,113,0.12) !important; border-color: rgba(248,113,113,0.25) !important; }

        /* ── Page badge borders ───────────────────────────────── */
        html[data-theme="dark"] .todo .page-badge   { border-color: rgba(77,142,245,0.35) !important; }
        html[data-theme="dark"] .orders .page-badge { border-color: rgba(52,211,153,0.35) !important; }
        html[data-theme="dark"] .events .page-badge { border-color: rgba(251,191,36,0.35) !important; }

        /* ── Worker badge ─────────────────────────────────────── */
        .page-badge.worker { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }
        html[data-theme="dark"] .page-badge.worker { border-color: rgba(167,139,250,0.35) !important; }

        /* ── Worker screen: event-list inner padding ─────────────── */
        .worker-screen .event-list {
            padding: 1.5vh 1.2vw;
        }

        /* ── Worker screen: compact meeting cards (match task card size) ── */
        .worker-screen .event-card-today {
            padding: 1.5vh 1.2vw;
            gap: 0.6vh;
        }
        .worker-screen .ev-time {
            font-size: clamp(0.7rem, 1.4vh, 0.95rem);
        }
        .worker-screen .ev-title-today {
            font-size: clamp(1rem, 2vh, 1.4rem);
            line-height: 1.25;
        }
        .worker-screen .ev-meta {
            font-size: clamp(0.65rem, 1.2vh, 0.85rem);
            margin-top: 0.2vh;
            gap: 1vw;
        }
        .worker-screen .dep-row {
            padding: 1.2vh 1.2vw;
            gap: 1vw;
        }
        .worker-screen .dep-date {
            font-size: clamp(0.8rem, 1.6vh, 1.1rem);
        }
        .worker-screen .dep-day {
            font-size: clamp(0.65rem, 1.2vh, 0.85rem);
        }
        .worker-screen .dep-title {
            font-size: clamp(0.9rem, 1.8vh, 1.25rem);
        }
        .worker-screen .dep-meta {
            font-size: clamp(0.65rem, 1.2vh, 0.85rem);
        }
        .worker-screen .dep-badge {
            font-size: clamp(0.65rem, 1.2vh, 0.85rem);
            padding: 3px 8px;
        }

        /* ── Worker screen columns ────────────────────────────── */
        .worker-col-header {
            padding: 2vh 1.8vw;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; background: var(--surface2);
            font-family: 'DM Mono', monospace; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            font-size: clamp(0.65rem, 1.2vw, 0.88rem); color: var(--text);
        }
        .worker-count-badge {
            font-family: 'DM Mono', monospace; font-size: clamp(0.6rem, 1vw, 0.8rem);
            background: rgba(167,139,250,0.1); color: var(--purple);
            padding: 2px 10px; border-radius: 100px;
        }

        /* ── Status select hover ──────────────────────────────── */
        html[data-theme="dark"] .status-select:hover { border-color: rgba(255,255,255,0.2) !important; color: var(--text) !important; }

        /* ── Scrollbar thumb ──────────────────────────────────── */
        html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12) !important; }

        /* ── Employee task count badge ────────────────────────── */
        html[data-theme="dark"] .emp-count { background: rgba(77,142,245,0.12) !important; }

        /* ── Logo dark mode ─────────────────────────────────────── */
        .logo-light { display: block; }
        .logo-dark { display: none; }
        html[data-theme="dark"] .logo-light { display: none; }
        html[data-theme="dark"] .logo-dark { display: block; }

        /* ── Hero card accent variables ─────────────────────────
           Light mode defined via class (remove inline style from HTML).
           Dark mode: brighter/saturated accent colors.             */
        .hero-ship { --ca: #1a7b4f; --cg: rgba(26,123,79,0.15); }
        .hero-prod { --ca: #a91f24; --cg: rgba(169,31,36,0.15); }
        .hero-pend { --ca: #aa1111; --cg: rgba(170,17,17,0.15); }
        html[data-theme="dark"] .hero-ship { --ca: #34d399; --cg: rgba(52,211,153,0.1); }
        html[data-theme="dark"] .hero-prod { --ca: #f87171; --cg: rgba(248,113,113,0.1); }
        html[data-theme="dark"] .hero-pend { --ca: #fbbf24; --cg: rgba(251,191,36,0.08); }

        /* ── Modern rounded cards ──────────────────────────────────── */
        .emp-col          { border-radius: 16px; overflow: hidden; }
        .emp-header       { border-radius: 16px 16px 0 0; }
        .task-card        { border-radius: 12px !important; }
        .hero-card        { border-radius: 16px; }
        .table-section    { border-radius: 16px; overflow: hidden; }
        .table-header     { border-radius: 16px 16px 0 0; }
        .event-card-today { border-radius: 14px; }
        .toast            { border-radius: 14px; }
        .settings-card    { border-radius: 20px; }

        /* ── Status bar auto-hide ──────────────────────────────────── */
        .status-bar {
            transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.4s ease;
            max-height: 140px; overflow: hidden;
        }
        .status-bar.sb-collapsed {
            max-height: 0; opacity: 0; pointer-events: none; margin-top: 0 !important;
        }
        .sb-trigger { position: fixed; bottom: 0; left: 0; right: 0; height: 16px; z-index: 50; }

        /* ── Settings modal ────────────────────────────────────────── */
        .settings-backdrop {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        .settings-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(4px);
        }
        .settings-card {
            position: relative; z-index: 10;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 32px 80px rgba(0,0,0,0.18);
            width: 720px; max-width: 95vw; max-height: 92vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .settings-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 28px 20px;
            border-bottom: 1px solid var(--border);
            border-radius: 20px 20px 0 0; gap: 16px;
            flex-shrink: 0;
        }
        .settings-body {
            padding: 0 28px 8px;
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            gap: 0 0;
            flex: 1; overflow-y: auto; scrollbar-width: thin;
        }
        .settings-col { padding: 20px 0; }
        .settings-col-right { padding: 20px 0 20px 28px; }
        .settings-col-left  { padding: 20px 28px 20px 0; }
        .settings-col-divider {
            width: 1px; background: var(--border); margin: 20px 0;
        }
        .settings-full {
            grid-column: 1 / -1;
            padding: 20px 0 4px;
            border-top: 1px solid var(--border);
        }
        .settings-section { margin-bottom: 20px; }
        .settings-section-label {
            font-size: 11px; font-weight: 700;
            font-family: 'DM Mono', monospace;
            color: var(--muted); text-transform: uppercase;
            letter-spacing: 0.14em; margin-bottom: 12px;
        }
        .settings-row {
            display: flex; align-items: center;
            justify-content: space-between; gap: 12px; padding: 11px 0;
        }
        .settings-row + .settings-row { border-top: 1px solid rgba(0,0,0,0.05); }
        .settings-row-label {
            font-size: 15px; font-weight: 600;
            color: var(--text); line-height: 1.3;
        }
        .settings-row-desc {
            font-size: 12px; font-family: 'DM Mono', monospace;
            color: var(--muted); margin-top: 3px; line-height: 1.4;
        }
        /* Toggle switch */
        .tog {
            position: relative; width: 44px; height: 24px;
            border-radius: 999px; border: none; cursor: pointer;
            flex-shrink: 0; transition: background 0.2s ease; outline: none;
        }
        .tog-thumb {
            position: absolute; top: 3px; left: 3px;
            width: 18px; height: 18px; background: white;
            border-radius: 999px; box-shadow: 0 1px 4px rgba(0,0,0,0.25);
            transition: transform 0.2s ease;
        }
        .tog.on  { background: var(--blue); }
        .tog.off { background: var(--border); }
        .tog.on .tog-thumb { transform: translateX(20px); }
        /* Interval pills */
        .i-pills { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .i-pill {
            padding: 6px 13px; font-size: 12px;
            font-family: 'DM Mono', monospace;
            border-radius: 8px; border: 1px solid var(--border);
            color: var(--muted); background: transparent;
            cursor: pointer; transition: all 0.15s ease; line-height: 1;
        }
        .i-pill:hover { border-color: rgba(0,0,0,0.22); color: var(--text); }
        .i-pill.on { background: var(--blue); color: white; border-color: var(--blue); }
        /* Settings number input */
        .s-input {
            font-family: 'DM Mono', monospace; font-size: 13px;
            color: var(--text); background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 7px 12px; outline: none; width: 88px;
            transition: border-color 0.2s;
        }
        .s-input:focus { border-color: var(--blue); }
        /* Lang pills */
        .lang-pills { display: flex; gap: 4px; }
        .lang-pill {
            padding: 5px 14px; font-size: 12px; font-weight: 700;
            font-family: 'DM Mono', monospace;
            border-radius: 8px; border: 1px solid var(--border);
            color: var(--muted); background: transparent;
            cursor: pointer; transition: all 0.15s ease;
            letter-spacing: 0.05em;
        }
        .lang-pill.on { background: var(--text); color: var(--surface); border-color: var(--text); }
        /* Gear button active */
        .nav-btn.gear-open { color: var(--blue); background: rgba(37,99,235,0.08); }
        /* Settings footer */
        .settings-footer {
            padding: 16px 28px; border-top: 1px solid var(--border);
            display: flex; justify-content: flex-end;
            flex-shrink: 0;
        }
        .reset-btn {
            font-size: 12px; font-family: 'DM Mono', monospace;
            color: var(--muted); background: transparent;
            border: none; cursor: pointer;
            padding: 5px 10px; border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }
        .reset-btn:hover { color: var(--red); background: rgba(220,38,38,0.07); }
        /* Close button */
        .settings-close {
            width: 32px; height: 32px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 8px; border: none; background: transparent;
            cursor: pointer; color: var(--muted); transition: all 0.15s; flex-shrink: 0;
        }
        .settings-close:hover { background: rgba(0,0,0,0.07); color: var(--text); }

        /* ── Machines grid columns ─────────────────────────────── */
        .mach-cols { grid-template-columns: 70px 120px 1fr 200px 200px 180px; }

        /* ── Machines badge ────────────────────────────────────── */
        .page-badge.machines { background: rgba(8,145,178,0.1); color: #0891b2; border: 1px solid rgba(8,145,178,0.3); }
        html[data-theme="dark"] .page-badge.machines { border-color: rgba(34,211,238,0.35) !important; color: #22d3ee !important; }
        html[data-theme="dark"] .machines .page-badge { border-color: rgba(34,211,238,0.35) !important; }

        /* ── Leads badge ───────────────────────────────────────── */
        .page-badge.leads { background: rgba(219,39,119,0.1); color: #db2777; border: 1px solid rgba(219,39,119,0.3); }
        html[data-theme="dark"] .page-badge.leads { border-color: rgba(244,114,182,0.35) !important; color: #f472b6 !important; }

        /* ── Machine tech pills ────────────────────────────────── */
        .tech-mjf, .tech-sls, .tech-fdm, .tech-other {
            border-radius: 100px; padding: 3px 10px;
            font-family: 'DM Mono', monospace;
            font-size: clamp(0.7rem, 1.3vh, 0.9rem);
            font-weight: 600; display: inline-block;
        }
        .tech-mjf   { background: rgba(14,165,233,0.12);  color: #0284c7; }
        .tech-sls   { background: rgba(249,115,22,0.1);   color: #ea580c; }
        .tech-fdm   { background: rgba(34,197,94,0.1);    color: #16a34a; }
        .tech-other { background: rgba(0,0,0,0.06);       color: var(--muted); font-weight: 400; }
        html[data-theme="dark"] .tech-mjf   { background: rgba(14,165,233,0.15);  color: #38bdf8; }
        html[data-theme="dark"] .tech-sls   { background: rgba(249,115,22,0.12);  color: #fb923c; }
        html[data-theme="dark"] .tech-fdm   { background: rgba(34,197,94,0.12);   color: #4ade80; }
        html[data-theme="dark"] .tech-other { background: rgba(255,255,255,0.07); }

        /* ── Machines table scrollbar ──────────────────────────── */
        .machines .table-body::-webkit-scrollbar { width: 4px; }
        .machines .table-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

        /* ── Orders table: even/odd rows ───────────────────────── */
        .orders .table-body .order-row:nth-child(odd) {
            background: var(--surface);
        }
        .orders .table-body .order-row:nth-child(even) {
            background: var(--surface2);
        }
        .orders .table-body .order-row:hover {
            filter: brightness(0.98);
            transition: filter 0.15s ease;
        }
        html[data-theme="dark"] .orders .table-body .order-row:hover {
            filter: brightness(1.05);
        }

        /* ── Machines table: even/odd rows + enhanced styling ──── */
        .machines .table-body .order-row:nth-child(odd) {
            background: var(--surface);
        }
        .machines .table-body .order-row:nth-child(even) {
            background: var(--surface2);
        }
        .machines .table-body .order-row {
            padding: 2.2vh 1.8vw;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .machines .table-body .order-row:hover {
            background: rgba(37, 99, 235, 0.04);
            transform: translateX(4px);
        }
        html[data-theme="dark"] .machines .table-body .order-row:hover {
            background: rgba(77, 142, 245, 0.08);
        }
        .machines .machine-name {
            font-size: clamp(1.05rem, 2.2vh, 1.5rem);
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .machines .machine-brand {
            font-family: 'DM Mono', monospace;
            font-size: clamp(0.7rem, 1.3vh, 0.9rem);
            color: var(--muted);
            margin-top: 0.4vh;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .machines .job-title {
            font-size: clamp(0.9rem, 1.8vh, 1.15rem);
            font-weight: 500;
            line-height: 1.35;
        }
        .machines .job-time {
            font-family: 'DM Mono', monospace;
            font-size: clamp(0.7rem, 1.3vh, 0.85rem);
            color: var(--muted);
            margin-top: 0.3vh;
        }
        .machines .table-th {
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        /* ── Leads columns grid ────────────────────────────────── */
        .leads-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vw;
            height: 100%;
        }
        .leads .col-panel { display: flex; flex-direction: column; overflow: hidden; }
        .leads .col-header {
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 2px solid var(--col-accent); flex-shrink: 0;
        }
        .leads .col-title {
            font-size: clamp(0.85rem, 2vh, 1.3rem);
            font-weight: 700; letter-spacing: -0.01em; color: var(--text);
            line-height: 1.2; overflow-wrap: break-word; word-break: break-word;
        }
        .leads .col-count {
            font-family: 'DM Mono', monospace;
            font-size: clamp(0.8rem, 1.5vh, 1rem);
            color: var(--col-accent); flex-shrink: 0; padding-left: 6px;
        }
        .leads .col-1 { --col-accent: var(--green); }
        .leads .col-2 { --col-accent: var(--blue); }
        .leads .col-3 { --col-accent: var(--amber); }
        .leads .col-4 { --col-accent: var(--purple); }
        .leads .col-5 { --col-accent: var(--red); }
        .leads .lead-list {
            flex: 1; display: flex; flex-direction: column;
            gap: 1vh; overflow-y: auto; min-height: 0;
        }
        .leads .empty-state {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 1.5vh; height: 100%;
            font-family: 'DM Mono', monospace; color: rgba(0,0,0,0.15);
            text-transform: uppercase; letter-spacing: 0.2em;
            font-size: clamp(0.75rem, 1.4vh, 0.95rem);
        }
        html[data-theme="dark"] .leads .empty-state { color: rgba(255,255,255,0.1); }
        .leads .empty-icon { font-size: 2rem; opacity: 0.25; }
    </style>
</head>

<body x-data="spaDashboard()" x-init="init()"
    class="master-wrap font-sans text-text bg-bg h-screen overflow-hidden flex flex-col" style="padding: 3vh 3.5vw 0">

    <!-- TOASTS -->
    <div class="toast-wrap fixed bottom-[70px] right-[40px] flex flex-col gap-3 z-[9999]">
        <template x-for="t in toasts" :key="t.id">
            <div class="toast bg-surface border border-border py-4 px-5 min-w-[290px] flex gap-3 items-start shadow-toast"
                :style="`--tc:${t.color}`">
                <div class="toast-icon text-xl" x-text="t.icon"></div>
                <div>
                    <div class="toast-title font-bold text-clamp-toast-title text-text mb-1" x-text="t.title"></div>
                    <div class="toast-msg font-mono text-clamp-toast-msg text-muted" x-text="t.msg"></div>
                </div>
            </div>
        </template>

        </div>
        <div class="header-right flex items-center gap-[2vw]">
            <div class="sync-pill flex items-center gap-2 font-mono text-clamp-sync py-[7px] px-4 border border-current rounded-[100px] whitespace-nowrap font-medium"

                <div class="sync-pip w-2 h-2 rounded-full bg-current animate-blink flex-shrink-0"></div>
                <span x-text="synced ? t('syncedLabel') : t('syncIn')+' '+refreshCd+'S'"></span>
            </div>

                <img src="img/logo_additium.svg" alt="ADDITIUM" class="h-[clamp(40px,6vh,70px)] object-contain logo-dark">
            </div>
        </div>
    </header>

        <!-- ── SCREEN 01: TODO ─────────────────────────────────────────────────── -->

                    <span x-text="t('loading')"></span>
                </div>

                <!-- Kanban board -->
                <div class="board flex gap-[1.5vw] overflow-x-auto overflow-y-hidden pb-1 min-h-0 flex-1"
                    x-show="!loading" x-cloak>
                    <template x-if="todo.employees.length===0">
                        <div
                            class="empty-board flex items-center justify-center flex-1 font-mono text-[1.2rem] text-[rgba(0,0,0,0.15)] uppercase tracking-widest"
                            x-text="t('noActiveTasks')"></div>
                    </template>

                    <template x-for="(emp, ei) in todo.employees" :key="emp.name + refreshKey">
                        <div class="emp-col flex-1 min-w-0 max-w-none bg-surface border border-border shadow-card animate-colIn flex flex-col"
                            :style="`animation-delay:${ei*70}ms`">

                            <!-- Column header -->
                            <div
                                class="emp-header py-[2vh] px-[1.8vw] border-b border-border flex justify-between items-center flex-shrink-0 bg-surface2">
                                <span class="emp-name text-clamp-emp-name font-bold uppercase tracking-widest font-mono"
                                    x-text="emp.name"></span>
                                <div class="flex items-center gap-2">
                                    <button @click.stop="setScreen(6 + ei)"
                                        class="nav-btn flex items-center justify-center w-[28px] h-[28px] border-none bg-transparent rounded-[8px] cursor-pointer text-muted transition-all duration-200 ease-cubic hover:bg-[rgba(0,0,0,0.05)] hover:text-text"
                                        title="Worker screen">
                                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                            <circle cx="12" cy="7" r="4"></circle>
                                        </svg>
                                    </button>
                                    <span

                            </div>

                            <div class="emp-tasks flex-1 overflow-y-auto py-[1.5vh] px-[1.2vw] flex flex-col gap-[1.2vh]">

                                        </div>
                                        <div class="task-text text-clamp-task-text font-semibold leading-snug text-text break-words whitespace-normal overflow-visible"
                                            x-text="task.text"></div>
                                        <div class="task-deadline flex items-center gap-2 font-mono text-clamp-task-deadline text-red bg-[rgba(220,38,38,0.05)] py-1 px-[10px] rounded font-medium"
                                            x-show="task.deadlineDay || task.deadlineTime">
                                            <span x-text="task.deadlineDay"></span>
                                            <span x-show="task.deadlineDay && task.deadlineTime"> · </span>
                                            <span x-text="task.deadlineTime"></span>
                                        </div>
                                        <div class="task-status font-mono text-clamp-task-status text-muted uppercase tracking-widest mt-auto"
                                            x-text="task.status"></div>
                                    </div>
                                </template>
                            </div>

                        </div>
                    </template>
                </div>

                <!-- KPI sidebar -->
                <div class="kpi-panel flex flex-col gap-[clamp(0.5rem,1.5vh,1.5rem)] border-l border-border flex-shrink-0" style="width:clamp(150px,14vw,200px);padding-left:1.5vw"
                    x-show="!loading" x-cloak>
                    <div class="kpi-block flex flex-col gap-[clamp(0.2rem,0.6vh,0.4rem)]">
                        <div class="kpi-label font-mono text-clamp-kpi-label text-muted uppercase tracking-widest" x-text="t('kpiOpenTasks')"></div>
                        <div class="kpi-value text-clamp-kpi-value font-bold tracking-tighter leading-none"
                            x-text="pad(todo.kpiOpen)"></div>
                        <div class="kpi-sub font-mono text-clamp-kpi-sub text-muted"
                            x-text="t('kpiAcross')+' '+todo.kpiEmp+' '+(todo.kpiEmp!==1?t('kpiEmployees'):t('kpiEmployee'))"></div>
                    </div>
                    <div class="kpi-divider h-px bg-border my-[0.3vh]"></div>
                    <div class="kpi-block flex flex-col gap-[clamp(0.2rem,0.6vh,0.4rem)]">
                        <div class="kpi-label font-mono text-clamp-kpi-label text-muted uppercase tracking-widest" x-text="t('kpiUrgent')"></div>
                        <div class="kpi-value text-clamp-kpi-value font-bold tracking-tighter leading-none"
                            :style="`color:var(--red)`" x-text="pad(todo.kpiUrgent)"></div>
                        <div class="kpi-sub font-mono text-clamp-kpi-sub text-muted" x-text="t('kpiRequiresAttn')"></div>
                    </div>
                    <div class="kpi-divider h-px bg-border my-[0.3vh]"></div>
                    <div class="kpi-block flex flex-col gap-[clamp(0.2rem,0.6vh,0.4rem)]">
                        <div class="kpi-label font-mono text-clamp-kpi-label text-muted uppercase tracking-widest" x-text="t('kpiInProgress')"></div>
                        <div class="kpi-value text-clamp-kpi-value font-bold tracking-tighter leading-none"
                            :style="`color:var(--amber)`" x-text="pad(todo.kpiProg)"></div>
                        <div class="kpi-sub font-mono text-clamp-kpi-sub text-muted" x-text="t('kpiCurrentlyActive')"></div>
                    </div>
                    <div class="kpi-divider h-px bg-border my-[0.3vh]"></div>
                    <div class="legend flex flex-col gap-[clamp(0.4rem,1vh,0.8rem)] mt-auto pb-[1.5vh]">
                        <div class="kpi-label font-mono text-clamp-kpi-label text-muted uppercase tracking-widest" x-text="t('kpiLegend')"></div>
                        <div class="legend-item flex items-center gap-[10px] font-mono text-clamp-legend text-muted">
                            <span class="legend-dot w-[10px] h-[10px] rounded-full flex-shrink-0"
                                style="background:var(--red)"></span>URGENTE</div>
                        <div class="legend-item flex items-center gap-[10px] font-mono text-clamp-legend text-muted">
                            <span class="legend-dot w-[10px] h-[10px] rounded-full flex-shrink-0"
                                style="background:var(--amber)"></span>IMPORTANTE</div>
                        <div class="legend-item flex items-center gap-[10px] font-mono text-clamp-legend text-muted">
                            <span class="legend-dot w-[10px] h-[10px] rounded-full flex-shrink-0"
                                style="background:var(--blue)"></span>NORMAL</div>
                        <div class="legend-item flex items-center gap-[10px] font-mono text-clamp-legend text-muted">
                            <span class="legend-dot w-[10px] h-[10px] rounded-full flex-shrink-0"
                                style="background:var(--green)"></span>BAJA</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ── SCREEN 02: ORDERS ───────────────────────────────────────────────── -->
        <div class="screen-slot orders" x-show="activeScreen===2" x-transition:enter="screen-fade-enter-active"
            x-transition:enter-start="screen-fade-enter" x-transition:leave="screen-fade-exit-active"
            x-transition:leave-start="screen-fade-exit">

            <div class="main-content flex-1 flex flex-col overflow-hidden min-h-0 relative z-[1]">
                <div class="hero-row grid grid-cols-3 gap-[1.5vw] flex-shrink-0 mb-[2vh] relative z-[1]">
                    <div class="hero-card hero-ship bg-surface border border-border border-t-[3px] py-[2.5vh] px-[2.5vw] flex flex-col gap-[1vh] relative overflow-hidden animate-cardInOrders shadow-card">
                        <div class="hero-card-inner flex justify-between h-full">
                            <div class="hero-stats flex flex-col gap-[1vh] flex-shrink-0 w-[45%]">
                                <div
                                    class="hero-label font-mono text-clamp-hero-label text-muted uppercase tracking-widest"
                                    x-text="t('ordShipping')"></div>
                                <div class="hero-value text-clamp-hero-value font-bold tracking-tighter leading-none"
                                    style="color:var(--ca)" x-text="pad(orders.valShip)"></div>
                                <div class="hero-sub font-mono text-clamp-hero-sub text-muted"
                                    x-show="orders.valShip === 0" x-text="t('ordNoShip')"></div>
                            </div>
                            <div class="hero-list-wrapper flex-1 relative ml-[5%]">
                                <div
                                    class="hero-list absolute inset-0 overflow-y-auto flex flex-col gap-[0.8vh] pr-[5px]">
                                    <template x-if="orders.valShip === 0">
                                        <div class="hero-list-empty font-mono text-clamp-hero-sub text-muted italic" x-text="t('ordNoOrders')"></div>
                                    </template>
                                    <template x-for="(o, idx) in orders.list.filter(x => x.cat === 'shipping')"
                                        :key="o.id + '_' + Math.random()">
                                        <div
                                            class="hero-list-item font-mono text-clamp-hero-list font-medium flex items-center gap-2 text-text">
                                            <span class="hero-list-icon text-[0.85em] flex-shrink-0"
                                                style="color:var(--ca)">▶</span> <span x-text="o.id"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="hero-card hero-prod bg-surface border border-border border-t-[3px] py-[2.5vh] px-[2.5vw] flex flex-col gap-[1vh] relative overflow-hidden animate-cardInOrders shadow-card">
                        <div class="hero-card-inner flex justify-between h-full">
                            <div class="hero-stats flex flex-col gap-[1vh] flex-shrink-0 w-[45%]">
                                <div
                                    class="hero-label font-mono text-clamp-hero-label text-muted uppercase tracking-widest"
                                    x-text="t('ordProduction')"></div>
                                <div class="hero-value text-clamp-hero-value font-bold tracking-tighter leading-none"
                                    style="color:var(--ca)" x-text="pad(orders.valProd)"></div>
                                <div class="hero-sub font-mono text-clamp-hero-sub text-muted"
                                    x-show="orders.valProd === 0" x-text="t('ordNoProd')"></div>
                            </div>
                            <div class="hero-list-wrapper flex-1 relative ml-[5%]">
                                <div
                                    class="hero-list absolute inset-0 overflow-y-auto flex flex-col gap-[0.8vh] pr-[5px]">
                                    <template x-if="orders.valProd === 0">
                                        <div class="hero-list-empty font-mono text-clamp-hero-sub text-muted italic" x-text="t('ordNoOrders')"></div>
                                    </template>
                                    <template x-for="(o, idx) in orders.list.filter(x => x.cat === 'production')"
                                        :key="o.id + '_' + Math.random()">
                                        <div
                                            class="hero-list-item font-mono text-clamp-hero-list font-medium flex items-center gap-2 text-text">
                                            <span class="hero-list-icon text-[0.85em] flex-shrink-0"
                                                style="color:var(--ca)">▶</span> <span x-text="o.id"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="hero-card hero-pend bg-surface border border-border border-t-[3px] py-[2.5vh] px-[2.5vw] flex flex-col gap-[1vh] relative overflow-hidden animate-cardInOrders shadow-card">
                        <div class="hero-card-inner flex justify-between h-full">
                            <div class="hero-stats flex flex-col gap-[1vh] flex-shrink-0 w-[45%]">
                                <div
                                    class="hero-label font-mono text-clamp-hero-label text-muted uppercase tracking-widest"
                                    x-text="t('ordPending')"></div>
                                <div class="hero-value text-clamp-hero-value font-bold tracking-tighter leading-none"
                                    style="color:var(--ca)" x-text="pad(orders.valPend)"></div>
                                <div class="hero-sub font-mono text-clamp-hero-sub text-muted"
                                    x-show="orders.valPend === 0" x-text="t('ordNoPend')"></div>
                            </div>
                            <div class="hero-list-wrapper flex-1 relative ml-[5%]">
                                <div
                                    class="hero-list absolute inset-0 overflow-y-auto flex flex-col gap-[0.8vh] pr-[5px]">
                                    <template x-if="orders.valPend === 0">
                                        <div class="hero-list-empty font-mono text-clamp-hero-sub text-muted italic" x-text="t('ordNoOrders')"></div>
                                    </template>
                                    <template x-for="(o, idx) in orders.list.filter(x => x.cat === 'pending')"
                                        :key="o.id + '_' + Math.random()">
                                        <div
                                            class="hero-list-item font-mono text-clamp-hero-list font-medium flex items-center gap-2 text-text">
                                            <span class="hero-list-icon text-[0.85em] flex-shrink-0"
                                                style="color:var(--ca)">▶</span> <span x-text="o.id"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div
                    class="table-section flex-1 bg-surface border border-border flex flex-col overflow-hidden relative z-[1] min-h-0 shadow-card">
                    <div
                        class="table-header grid grid-cols-[180px_1fr_180px_180px_150px] py-[1.5vh] px-[2vw] border-b border-border flex-shrink-0 bg-surface2">
                        <div class="th font-mono text-clamp-th uppercase tracking-widest text-muted" x-text="t('thOrderId')"></div>
                        <div class="th font-mono text-clamp-th uppercase tracking-widest text-muted" x-text="t('thClient')"></div>
                        <div class="th font-mono text-clamp-th uppercase tracking-widest text-muted" x-text="t('thShipDate')"></div>
                        <div class="th font-mono text-clamp-th uppercase tracking-widest text-muted" x-text="t('thPriority')"></div>
                        <div class="th font-mono text-clamp-th uppercase tracking-widest text-muted" x-text="t('thStatus')"></div>
                    </div>
                    <div class="table-body flex-1 overflow-y-auto">
                        <template x-if="orders.list.length===0">
                            <div
                                class="empty-table flex items-center justify-center h-full font-mono text-[1rem] text-[rgba(0,0,0,0.1)] uppercase tracking-widest"
                                x-text="t('ordNoFound')"></div>
                        </template>
                        <template x-for="(o, i) in orders.list" :key="o.id + '_' + Math.random()">
                            <div class="order-row grid grid-cols-[180px_1fr_180px_180px_150px] py-[1.8vh] px-[2vw] border-b border-border items-center animate-rowIn"
                                :class="o.cat" :style="`animation-delay:${i*40}ms`">
                                <div class="order-id font-mono text-clamp-order-id font-medium" x-text="o.id"></div>
                                <div class="order-client text-clamp-order-client font-semibold text-text"

                                <div class="order-date font-mono text-clamp-order-date text-muted" x-text="o.date">
                                </div>
                                <div class="order-imp font-mono text-clamp-order-imp text-muted uppercase">
                                    <span
                                        class="imp-pill inline-flex items-center rounded-[12px] py-[3px] px-3 text-inherit uppercase capitalize"
                                        :class="o.impClass" x-text="o.imp"></span>
                                </div>
                                <div>
                                    <div class="chip inline-flex items-center justify-center py-1 px-3 rounded-[12px] font-mono text-clamp-chip font-medium capitalize border-none"
                                        :class="o.chipClass">
                                        <span x-text="o.chipLabel"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── SCREEN 03: EVENTS ──────────────────────────────────────────────── -->
        <div class="screen-slot events" x-show="activeScreen===3" x-transition:enter="screen-fade-enter-active"
            x-transition:enter-start="screen-fade-enter" x-transition:leave="screen-fade-exit-active"
            x-transition:leave-start="screen-fade-exit">

            <div class="main-content events-grid flex-1 overflow-hidden relative z-[1] min-h-0">
                <!-- Today -->
                <div class="col-panel col-today">
                    <div class="col-header">
                        <span class="col-title" x-text="t('evToday')"></span>
                        <span class="col-count"
                            x-text="events.today.length+' '+(events.today.length!==1?t('evEvents'):t('evEvent'))"></span>
                    </div>
                    <div class="event-list">
                        <template x-if="events.today.length===0">
                            <div class="empty-state">
                                <div class="empty-icon">✅</div>
                                <div x-text="t('evNoToday')"></div>
                            </div>
                        </template>
                        <template x-for="(e,i) in events.today" :key="i+refreshKey">
                            <div class="event-card-today" :style="`animation-delay:${i*70}ms`">
                                <div class="ev-time" x-text="e.time||'TBD'"></div>
                                <div class="ev-title-today" x-text="e.title"></div>
                                <div class="ev-meta">
                                    <span x-show="e.place">📍 <span x-text="e.place"></span></span>
                                    <span x-show="e.responsible">👤 <span x-text="e.responsible"></span></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- Upcoming -->
                <div class="col-panel col-upcoming">
                    <div class="col-header">
                        <span class="col-title" x-text="t('evUpcoming')"></span>
                        <span class="col-count" x-text="events.upcoming.length+' '+t('evScheduled')"></span>
                    </div>
                    <div class="event-list">
                        <template x-if="events.upcoming.length===0">
                            <div class="empty-state">
                                <div class="empty-icon">🗓</div>
                                <div x-text="t('evNoUpcoming')"></div>
                            </div>
                        </template>
                        <template x-for="(e,i) in events.upcoming" :key="i+refreshKey">
                            <div class="dep-row" :style="`animation-delay:${i*60}ms`">
                                <div>
                                    <div class="dep-date" x-text="e.dateLabel"></div>
                                    <div class="dep-day" x-text="e.dayName"></div>
                                </div>
                                <div>
                                    <div class="dep-title" x-text="e.title"></div>
                                    <div class="dep-meta"
                                        x-text="[e.time,e.place,e.responsible].filter(Boolean).join(' · ')"></div>
                                </div>

                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── SCREEN 04: MACHINES ───────────────────────────────────────────── -->

            x-transition:leave-start="screen-fade-exit">

            <div class="main-content flex-1 flex flex-col overflow-hidden relative z-[1] min-h-0">
